        "500":
          $ref: "#/components/responses/InternalServerError"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    TodoID:
      name: id
      in: path
      required: true
      schema:
        type: integer
        format: uint64
        minimum: 1
    CustomerID:
      name: id
      in: path
      required: true
      schema:
        type: integer
        format: uint64
        minimum: 1
    OrgID:
      name: orgId
      in: path
      required: true
      description: 必须与 access token 中的组织 ID 一致。
      schema:
        type: string
    PluginID:
      name: pluginId
      in: path
      required: true
      schema:
        type: string
    PluginProxyPath:
      name: path
      in: path
      required: true
      description: 插件代理路径，必须匹配 manifest proxy.prefixes。
      schema:
        type: string
  responses:
    TokenPair:
      description: 令牌对。
      content:
        application/json:
          schema:
            allOf:
              - $ref: "#/components/schemas/Result"
              - type: object
                properties:
                  data:
                    $ref: "#/components/schemas/TokenPair"
    BadRequest:
      description: 请求输入无效。
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResult"
    Unauthorized:
      description: 认证失败或令牌无效。
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResult"
    Forbidden:
      description: 已认证主体权限不足。
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResult"
    NotFound:
      description: 资源不存在。
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResult"
    ServiceUnavailable:
      description: 服务未就绪。
      content:
        application/json:
          schema:
            allOf:
              - $ref: "#/components/schemas/ErrorResult"
              - type: object
                properties:
                  data:
                    $ref: "#/components/schemas/ReadyStatus"
    InternalServerError:
      description: 服务端内部错误。
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResult"
  schemas:
    Result:
      type: object
      required: [code, message, serverTime]
      properties:
        code:
          type: integer
          example: 0
        message:
          type: string
          example: success
        data:
          nullable: true
        traceId:
          type: string
          nullable: true
        serverTime:
          type: integer
          format: int64
          description: Unix 秒级时间戳。
    ErrorResult:
      type: object
      required: [code, message, serverTime]
      properties:
        code:
          type: integer
          description: 来自 types/errors 的错误码。
          example: 1000
        message:
          type: string
        traceId:
          type: string
          nullable: true
        serverTime:
          type: integer
          format: int64
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [ok]
    ReadyStatus:
      type: object
      required: [status, checks]
      properties:
        status:
          type: string
          enum: [ready, not_ready]
        checks:
          type: object
          additionalProperties:
            type: string
          example:
            database: ok
    Todo:
      type: object
      required: [id, title, completed, createdAt, updatedAt]
      properties:
        id:
          type: integer
          format: uint64
        title:
          type: string
        description:
          type: string
        completed:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    CreateTodoRequest:
      type: object
      required: [title]
      properties:
        title:
          type: string
        description:
          type: string
        completed:
          type: boolean
          default: false
    UpdateTodoRequest:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        completed:
          type: boolean
    DemoCustomer:
      type: object
      required: [id, customerName, customerPhoneData, ownerUserId, ownerUsername, ownerRoleCode, orgId, createdAt, updatedAt]
      properties:
        id:
          type: integer
          format: uint64
        customerName:
          type: string
        customerPhoneData:
          type: string
        ownerUserId:
          type: string
        ownerUsername:
          type: string
        ownerRoleCode:
          type: string
        orgId:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    DemoCustomerPage:
      type: object
      required: [items, page, pageSize, storageStatus, total]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/DemoCustomer"
        page:
          type: integer
        pageSize:
          type: integer
        storageStatus:
          type: string
          enum: [persisted]
        total:
          type: integer
          format: int64
    CreateDemoCustomerRequest:
      type: object
      required: [customerName, customerPhoneData]
      properties:
        customerName:
          type: string
        customerPhoneData:
          type: string
    UpdateDemoCustomerRequest:
      type: object
      properties:
        customerName:
          type: string
        customerPhoneData:
          type: string
    PluginManifest:
      type: object
      required: [id, name, version, baseURL, healthPath, frontend, menus, permissions, proxy]
      properties:
        id:
          type: string
        name:
          type: string
        version:
          type: string
        baseURL:
          type: string
        healthPath:
          type: string
        frontend:
          type: object
          properties:
            entry:
              type: string
        menus:
          type: array
          items:
            $ref: "#/components/schemas/PluginMenu"
        permissions:
          type: array
          items:
            $ref: "#/components/schemas/PluginPermission"
        proxy:
          type: object
          properties:
            prefixes:
              type: array
              items:
                type: string
        secretRef:
          type: string
    PluginMenu:
      type: object
      required: [code, label, path]
      properties:
        code:
          type: string
        label:
          type: string
        icon:
          type: string
        path:
          type: string
        permission:
          type: string
        order:
          type: integer
    PluginPermission:
      type: object
      required: [code, name]
      properties:
        code:
          type: string
        name:
          type: string
        description:
          type: string
    SystemMenuGroup:
      type: object
      required: [code, label, order, items]
      properties:
        code:
          type: string
        label:
          type: string
        order:
          type: integer
        items:
          type: array
          items:
            $ref: "#/components/schemas/SystemMenuItem"
    SystemMenuItem:
      type: object
      required: [code, label, icon, path, mobile, order]
      properties:
        code:
          type: string
        label:
          type: string
        icon:
          type: string
        path:
          type: string
        permission:
          type: string
        mobile:
          type: boolean
        order:
          type: integer
    SystemConfigSnapshot:
      type: object
      required: [sections]
      properties:
        sections:
          type: array
          items:
            $ref: "#/components/schemas/SystemConfigSection"
    SystemConfigSection:
      type: object
      required: [code, label, description, icon, order, items]
      properties:
        code:
          type: string
        label:
          type: string
        description:
          type: string
        icon:
          type: string
        order:
          type: integer
        items:
          type: array
          items:
            $ref: "#/components/schemas/SystemConfigItem"
    SystemConfigItem:
      type: object
      required: [key, label, value, secret, source, description]
      properties:
        key:
          type: string
        label:
          type: string
        value:
          description: Sanitized runtime value. Secret fields expose only configured/unconfigured state.
        secret:
          type: boolean
        source:
          type: string
        description:
          type: string
    SystemServerInfo:
      type: object
      required: [build, cpu, disk, gc, memory, os, ram, refreshedAt, runtime]
      properties:
        build:
          $ref: "#/components/schemas/SystemServerBuildInfo"
        cpu:
          $ref: "#/components/schemas/SystemServerCPUInfo"
        disk:
          type: array
          items:
            $ref: "#/components/schemas/SystemServerDiskInfo"
        gc:
          $ref: "#/components/schemas/SystemServerGCInfo"
        memory:
          $ref: "#/components/schemas/SystemServerMemoryInfo"
        os:
          $ref: "#/components/schemas/SystemServerOSInfo"
        ram:
          $ref: "#/components/schemas/SystemServerRAMInfo"
        refreshedAt:
          type: string
          format: date-time
        runtime:
          $ref: "#/components/schemas/SystemServerRuntimeInfo"
    SystemServerOSInfo:
      type: object
      required: [compiler, goarch, goos, goVersion, numCpu, numGoroutine]
      properties:
        compiler:
          type: string
        goarch:
          type: string
        goos:
          type: string
        goVersion:
          type: string
        numCpu:
          type: integer
        numGoroutine:
          type: integer
    SystemServerRuntimeInfo:
      type: object
      required: [startTime, uptime, uptimeSeconds]
      properties:
        startTime:
          type: string
          format: date-time
        uptime:
          type: string
        uptimeSeconds:
          type: integer
          format: int64
    SystemServerCPUInfo:
      type: object
      required: [cores, percent]
      properties:
        cores:
          type: integer
        percent:
          type: array
          items:
            type: number
            format: double
    SystemServerRAMInfo:
      type: object
      required: [totalMb, usedMb, usedPercent]
      properties:
        totalMb:
          type: integer
          format: int64
        usedMb:
          type: integer
          format: int64
        usedPercent:
          type: number
          format: double
    SystemServerDiskInfo:
      type: object
      required: [fsType, mountPoint, totalGb, totalMb, usedGb, usedMb, usedPercent]
      properties:
        fsType:
          type: string
        mountPoint:
          type: string
        totalGb:
          type: integer
          format: int64
        totalMb:
          type: integer
          format: int64
        usedGb:
          type: integer
          format: int64
        usedMb:
          type: integer
          format: int64
        usedPercent:
          type: number
          format: double
    SystemServerMemoryInfo:
      type: object
      required: [allocMb, heapAllocMb, heapIdleMb, heapInuseMb, heapObjects, heapReleasedMb, heapSysMb, stackInuseMb, stackSysMb, sysMb, totalAllocMb]
      properties:
        allocMb:
          type: integer
          format: int64
        heapAllocMb:
          type: integer
          format: int64
        heapIdleMb:
          type: integer
          format: int64
        heapInuseMb:
          type: integer
          format: int64
        heapObjects:
          type: integer
          format: int64
        heapReleasedMb:
          type: integer
          format: int64
        heapSysMb:
          type: integer
          format: int64
        stackInuseMb:
          type: integer
          format: int64
        stackSysMb:
          type: integer
          format: int64
        sysMb:
          type: integer
          format: int64
        totalAllocMb:
          type: integer
          format: int64
    SystemServerGCInfo:
      type: object
      required: [nextGcMb, numGc, pauseTotalNs]
      properties:
        lastGcAt:
          type: string
          format: date-time
        nextGcMb:
          type: integer
          format: int64
        numGc:
          type: integer
        pauseTotalNs:
          type: integer
          format: int64
    SystemServerBuildInfo:
      type: object
      required: [goVersion, module, path, settings, version]
      properties:
        goVersion:
          type: string
        module:
          type: string
        path:
          type: string
        settings:
          type: array
          items:
            $ref: "#/components/schemas/SystemServerBuildSetting"
        version:
          type: string
    SystemServerBuildSetting:
      type: object
      required: [key, value]
      properties:
        key:
          type: string
        value:
          type: string
    SystemAPIGroup:
      type: object
      required: [code, label, count, items]
      properties:
        code:
          type: string
        label:
          type: string
        count:
          type: integer
        items:
          type: array
          items:
            $ref: "#/components/schemas/SystemAPIEntry"
    SystemAPIEntry:
      type: object
      required: [code, group, method, path, description, permissionRegistered, order, synced]
      properties:
        code:
          type: string
        group:
          type: string
        method:
          type: string
        path:
          type: string
        description:
          type: string
        permission:
          type: string
        permissionRegistered:
          type: boolean
        order:
          type: integer
        synced:
          type: boolean
        syncedAt:
          type: string
          format: date-time
    SystemAPISyncResult:
      type: object
      required: [created, groups, persisted, stale, storageStatus, syncedAt, total, updated]
      properties:
        created:
          type: integer
        groups:
          type: array
          items:
            $ref: "#/components/schemas/SystemAPIGroup"
        persisted:
          type: boolean
        stale:
          type: integer
        storageStatus:
          type: string
          enum: [memory, unavailable, persisted]
        syncedAt:
          type: string
          format: date-time
        total:
          type: integer
        updated:
          type: integer
