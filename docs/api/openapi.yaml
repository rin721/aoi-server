openapi: 3.0.3
info:
  title: go-scaffold API
  version: "1.0.0"
  description: >
    当前 go-scaffold HTTP 路由重新生成的 API 契约。本文件基于当前有效的
    路由注册以及 handler、service、model 类型，不基于历史遗留路由记录。
servers:
  - url: http://127.0.0.1:9999
    description: 默认本地服务
tags:
  - name: 探针
  - name: 演示 Todo
  - name: 客户资源示例
  - name: IAM 认证
  - name: IAM 账号
  - name: IAM 组织
  - name: IAM API Token
  - name: IAM 会话
  - name: IAM 审计
  - name: 插件
security:
  - bearerAuth: []
paths:
  /health:
    get:
      tags: [探针]
      summary: 存活探针
      security: []
      responses:
        "200":
          description: 进程存活。
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Result"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/HealthStatus"
  /ready:
    get:
      tags: [探针]
      summary: 就绪探针
      security: []
      responses:
        "200":
          description: 服务依赖已就绪。
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Result"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/ReadyStatus"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
  /api/v1/demo/todos:
    post:
      tags: [演示 Todo]
      summary: 创建演示 Todo
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTodoRequest"
      responses:
        "201":
          description: 演示 Todo 已创建。
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Result"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/Todo"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalServerError"
    get:
      tags: [演示 Todo]
      summary: 查询演示 Todo 列表
      security: []
      responses:
        "200":
          description: 演示 Todo 列表。
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Result"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/Todo"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /api/v1/demo/todos/{id}:
    parameters:
      - $ref: "#/components/parameters/TodoID"
    get:
      tags: [演示 Todo]
      summary: 查询单个演示 Todo
      security: []
      responses:
        "200":
          description: 演示 Todo 已找到。
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Result"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/Todo"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
    put:
      tags: [演示 Todo]
      summary: 更新演示 Todo
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTodoRequest"
      responses:
        "200":
          description: 演示 Todo 已更新。
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Result"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/Todo"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
    delete:
      tags: [演示 Todo]
      summary: 删除演示 Todo
      security: []
      responses:
        "200":
          description: 演示 Todo 已删除。
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Result"
                  - type: object
                    properties:
                      data:
                        type: object
                        required: [deleted]
                        properties:
                          deleted:
                            type: boolean
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /api/v1/demo/customers:
    get:
      tags: [客户资源示例]
      summary: 查询客户资源列表
      parameters:
        - name: keyword
          in: query
          required: false
          schema:
            type: string
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: pageSize
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
      responses:
        "200":
          description: 当前主体可见的客户资源分页。
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Result"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/DemoCustomerPage"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"
    post:
      tags: [客户资源示例]
      summary: 创建客户资源
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDemoCustomerRequest"
      responses:
        "201":
          description: 客户资源已创建。
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Result"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/DemoCustomer"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /api/v1/demo/customers/{id}:
    parameters:
      - $ref: "#/components/parameters/CustomerID"
    get:
      tags: [客户资源示例]
      summary: 查询单个客户资源
      responses:
        "200":
          description: 客户资源已找到。
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Result"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/DemoCustomer"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
    patch:
      tags: [客户资源示例]
      summary: 更新客户资源
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateDemoCustomerRequest"
      responses:
        "200":
          description: 客户资源已更新。
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Result"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/DemoCustomer"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
    delete:
      tags: [客户资源示例]
      summary: 删除客户资源
      responses:
        "200":
          description: 客户资源已删除。
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Result"
                  - type: object
                    properties:
                      data:
                        type: object
                        required: [deleted]
                        properties:
                          deleted:
                            type: boolean
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /api/v1/auth/setup/status:
    get:
      tags: [IAM 认证]
      summary: Check whether first-time admin setup is required
      security: []
      responses:
        "200":
          description: Setup status.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Result"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/SetupStatus"
        "429":
          description: Public auth endpoint rate limit reached.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResult"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /api/v1/auth/setup/initial-admin:
    post:
      tags: [IAM 认证]
      summary: Create the first organization owner when IAM has no users
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InitialAdminSetupRequest"
      responses:
        "200":
          $ref: "#/components/responses/TokenPair"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          description: Public auth endpoint rate limit reached.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResult"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /api/v1/auth/signup:
    post:
      tags: [IAM 认证]
      summary: 自助注册并创建首个组织 owner
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignupRequest"
      responses:
        "200":
          $ref: "#/components/responses/TokenPair"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          description: 认证入口触发限流。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResult"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /api/v1/auth/captcha:
    get:
      tags: [IAM 认证]
      summary: 获取登录验证码
      security: []
      responses:
        "200":
          description: 登录验证码状态与图片。
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Result"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/CaptchaChallenge"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /api/v1/auth/login:
    post:
      tags: [IAM 认证]
      summary: 登录并签发令牌
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          $ref: "#/components/responses/TokenPair"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /api/v1/auth/refresh:
    post:
      tags: [IAM 认证]
      summary: 刷新 access token 和 refresh token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
      responses:
        "200":
          $ref: "#/components/responses/TokenPair"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /api/v1/auth/logout:
    post:
      tags: [IAM 认证]
      summary: 撤销当前会话
      responses:
        "200":
          description: 会话已撤销。
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Result"
                  - type: object
                    properties:
                      data:
                        type: object
                        required: [loggedOut]
                        properties:
                          loggedOut:
                            type: boolean
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /api/v1/auth/switch-org:
    post:
      tags: [IAM 认证]
      summary: 切换当前组织并签发新令牌
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SwitchOrgRequest"
      responses:
        "200":
          $ref: "#/components/responses/TokenPair"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /api/v1/auth/password/forgot:
    post:
      tags: [IAM 认证]
      summary: 创建密码重置令牌
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForgotPasswordRequest"
      responses:
        "200":
          description: 重置通知已创建。debug/noop/local 通知驱动会在响应中返回调试 token/link。
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Result"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/NotificationDelivery"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /api/v1/auth/password/reset:
    post:
      tags: [IAM 认证]
      summary: 使用重置令牌重置密码
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResetPasswordRequest"
      responses:
        "200":
          description: 密码已重置。
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Result"
                  - type: object
                    properties:
                      data:
                        type: object
                        required: [reset]
                        properties:
                          reset:
                            type: boolean
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /api/v1/auth/mfa/setup:
    post:
      tags: [IAM 账号]
      summary: 创建或轮换 TOTP MFA 密钥
      responses:
        "200":
          description: MFA 密钥和 otpauth URL。
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Result"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/MFASetup"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /api/v1/auth/mfa/verify:
    post:
      tags: [IAM 账号]
      summary: 验证并启用 TOTP MFA
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyMFARequest"
      responses:
        "200":
          description: MFA 已启用。
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Result"
                  - type: object
                    properties:
                      data:
                        type: object
                        required: [verified]
                        properties:
                          verified:
                            type: boolean
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /api/v1/invitations/{token}/accept:
    post:
      tags: [IAM 认证]
      summary: 接受组织邀请
      security: []
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AcceptInvitationRequest"
      responses:
        "201":
          description: 邀请已接受。
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Result"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/Principal"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /api/v1/me:
    get:
      tags: [IAM 账号]
      summary: 获取当前用户资料
      responses:
        "200":
          description: 当前用户。
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Result"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /api/v1/me/orgs:
    get:
      tags: [IAM 账号]
      summary: 查询当前用户所属组织
      responses:
        "200":
          description: 当前用户所属组织。
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Result"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/Organization"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /api/v1/orgs:
    get:
      tags: [IAM 组织]
      summary: 查询组织列表
      parameters:
        - name: keyword
          in: query
          schema:
            type: string
          description: 关键字，匹配组织 Code、名称和状态。
        - name: code
          in: query
          schema:
            type: string
          description: 按组织 Code 模糊筛选。
        - name: name
          in: query
          schema:
            type: string
          description: 按组织名称模糊筛选。
        - name: status
          in: query
          schema:
            type: string
            enum: [active, disabled]
          description: 按组织状态筛选。
        - name: orderKey
          in: query
          schema:
            type: string
            enum: [id, code, name, status]
          description: 排序字段，默认 id。
        - name: desc
          in: query
          schema:
            type: boolean
          description: 是否倒序。
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
          description: 页码，默认 1。
        - name: pageSize
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
          description: 每页数量，默认 10，最大 100。
      responses:
        "200":
          description: 分页组织列表。
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Result"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/OrganizationPage"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"
    post:
      tags: [IAM 组织]
      summary: 创建组织
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrgRequest"
      responses:
        "201":
          description: 组织已创建。
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Result"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/Organization"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /api/v1/orgs/{orgId}:
    parameters:
      - $ref: "#/components/parameters/OrgID"
    patch:
      tags: [IAM 组织]
      summary: 更新当前组织信息
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOrgRequest"
      responses:
        "200":
          description: 组织已更新。
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Result"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/Organization"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /api/v1/orgs/{orgId}/users:
    parameters:
      - $ref: "#/components/parameters/OrgID"
    get:
      tags: [IAM 组织]
      summary: 查询当前组织用户
      parameters:
        - name: keyword
          in: query
          schema:
            type: string
          description: 匹配用户名、显示名、邮箱、成员状态或角色。
        - name: username
          in: query
          schema:
            type: string
        - name: displayName
          in: query
          schema:
            type: string
          description: 显示名筛选；兼容 nickName/nickname 查询参数。
        - name: email
          in: query
          schema:
            type: string
        - name: roleCode
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
