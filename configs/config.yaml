server:
  host: 127.0.0.1
  port: 9999
  mode: release
  read_timeout: 10
  write_timeout: 10
  idle_timeout: 30

rpc:
  enabled: true
  host: 127.0.0.1
  port: 10099
  read_timeout: 10
  write_timeout: 10
  idle_timeout: 30

database:
  # 本地默认使用 SQLite。只有在目标数据库可用时才切换到 mysql/postgres。
  driver: sqlite
  dbname: ./data/app.db
  max_open_conns: 1
  max_idle_conns: 1

redis:
  enabled: false
  host: 127.0.0.1
  port: 6379
  db: 0

logger:
  level: info
  format: console
  output: stdout

i18n:
  default: zh-CN
  supported:
    - zh-CN
    - en-US
  messages_dir: ./configs/locales

executor:
  enabled: true
  pools:
    - name: background
      size: 8
      expiry: 30
      non_blocking: true

storage:
  enabled: false
  fs_type: basepath
  base_path: ./data
  enable_watch: false
  watch_buffer_size: 100

demo:
  enabled: true
  apply_schema_on_start: true

cors:
  enabled: true
  allow_origins:
    - "*"
  allow_methods:
    - GET
    - POST
    - PUT
    - DELETE
    - PATCH
    - OPTIONS
  allow_headers:
    - Origin
    - Content-Type
    - X-Request-ID
    - Authorization
  expose_headers:
    - X-Request-ID
  allow_credentials: false
  max_age: 3600

auth:
  enabled: true
  issuer: go-scaffold
  audience:
    - go-scaffold-api
  signing_key: ${AUTH_SIGNING_KEY:dev-signing-key-change-me-32-bytes}
  access_token_ttl_seconds: 900
  refresh_token_ttl_seconds: 604800
  refresh_token_pepper: ${AUTH_REFRESH_TOKEN_PEPPER:dev-refresh-pepper-change-me-32}
  mfa_issuer: go-scaffold
  mfa_secret_key: ${AUTH_MFA_SECRET_KEY:dev-mfa-secret-key-change-me-032}
  login_max_failures: 5
  login_lock_minutes: 15
  invitation_ttl_seconds: 86400
  password_reset_ttl_seconds: 1800
  casbin_reload_interval_seconds: 300

migration:
  auto_apply: false
  dir: ./internal/migrations
