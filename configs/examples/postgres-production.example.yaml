# 场景：PostgreSQL 生产部署。
# 适合容器、systemd 或 Kubernetes 环境。该文件依赖运行时环境变量提供数据库和 IAM secret。
# 迁移默认关闭，发布时应先执行 db migrate status/up。

server:
  host: 0.0.0.0
  port: ${RIN_APP_SERVER_PORT:9999}
  mode: release
  read_timeout: ${RIN_APP_SERVER_READ_TIMEOUT:10}
  write_timeout: ${RIN_APP_SERVER_WRITE_TIMEOUT:10}
  idle_timeout: ${RIN_APP_SERVER_IDLE_TIMEOUT:30}

webui:
  enabled: ${RIN_APP_WEBUI_ENABLED:true}
  mount_path: ${RIN_APP_WEBUI_MOUNT_PATH:/admin}
  dist_dir: ${RIN_APP_WEBUI_DIST_DIR:./web/admin/.output/public}
  public_base_url: ${RIN_APP_WEBUI_PUBLIC_BASE_URL:/admin}

rpc:
  enabled: ${RIN_APP_RPC_ENABLED:false}
  host: ${RIN_APP_RPC_HOST:127.0.0.1}
  port: ${RIN_APP_RPC_PORT:10099}
  read_timeout: ${RIN_APP_RPC_READ_TIMEOUT:10}
  write_timeout: ${RIN_APP_RPC_WRITE_TIMEOUT:10}
  idle_timeout: ${RIN_APP_RPC_IDLE_TIMEOUT:30}

plugins:
  enabled: ${RIN_APP_PLUGINS_ENABLED:false}
  manifests:
    - ${RIN_APP_PLUGINS_MANIFESTS:./plugins/demo1/plugin.yaml}
  items: []
  health_timeout_seconds: ${RIN_APP_PLUGINS_HEALTH_TIMEOUT_SECONDS:3}
  proxy_timeout_seconds: ${RIN_APP_PLUGINS_PROXY_TIMEOUT_SECONDS:30}

database:
  driver: postgres
  host: ${RIN_APP_DB_HOST}
  port: ${RIN_APP_DB_PORT:5432}
  user: ${RIN_APP_DB_USER}
  password: ${RIN_APP_DB_PASSWORD}
  dbname: ${RIN_APP_DB_NAME}
  max_open_conns: ${RIN_APP_DB_MAX_OPEN_CONNS:30}
  max_idle_conns: ${RIN_APP_DB_MAX_IDLE_CONNS:15}

redis:
  enabled: ${RIN_APP_REDIS_ENABLED:false}
  host: ${RIN_APP_REDIS_HOST:127.0.0.1}
  port: ${RIN_APP_REDIS_PORT:6379}
  password: ${RIN_APP_REDIS_PASSWORD:}
  db: ${RIN_APP_REDIS_DB:0}
  pool_size: ${RIN_APP_REDIS_POOL_SIZE:20}
  min_idle_conns: ${RIN_APP_REDIS_MIN_IDLE_CONNS:5}
  max_retries: ${RIN_APP_REDIS_MAX_RETRIES:3}
  dial_timeout: ${RIN_APP_REDIS_DIAL_TIMEOUT:5}
  read_timeout: ${RIN_APP_REDIS_READ_TIMEOUT:3}
  write_timeout: ${RIN_APP_REDIS_WRITE_TIMEOUT:3}

logger:
  level: ${RIN_APP_LOG_LEVEL:info}
  format: ${RIN_APP_LOG_FORMAT:json}
  console_format: ${RIN_APP_LOG_CONSOLE_FORMAT:json}
  file_format: ${RIN_APP_LOG_FILE_FORMAT:json}
  output: ${RIN_APP_LOG_OUTPUT:stdout}
  file_path: ${RIN_APP_LOG_FILE_PATH:/app/logs/go-scaffold.log}
  max_size: ${RIN_APP_LOG_MAX_SIZE:100}
  max_backups: ${RIN_APP_LOG_MAX_BACKUPS:7}
  max_age: ${RIN_APP_LOG_MAX_AGE:30}

i18n:
  default: ${RIN_APP_I18N_DEFAULT:zh-CN}
  supported:
    - zh-CN
    - en-US
  messages_dir: ${RIN_APP_I18N_MESSAGES_DIR:./configs/locales}

executor:
  enabled: ${RIN_APP_EXECUTOR_ENABLED:true}
  pools:
    - name: background
      size: 16
      expiry: 30
      non_blocking: true

storage:
  enabled: ${RIN_APP_STORAGE_ENABLED:false}
  fs_type: ${RIN_APP_STORAGE_FS_TYPE:basepath}
  base_path: ${RIN_APP_STORAGE_BASE_PATH:/app/data}
  enable_watch: ${RIN_APP_STORAGE_ENABLE_WATCH:false}
  watch_buffer_size: ${RIN_APP_STORAGE_WATCH_BUFFER_SIZE:100}

demo:
  enabled: ${RIN_APP_DEMO_ENABLED:false}
  apply_schema_on_start: ${RIN_APP_DEMO_APPLY_SCHEMA_ON_START:false}

system:
  seed_defaults_on_start: ${RIN_APP_SYSTEM_SEED_DEFAULTS_ON_START:true}

cors:
  enabled: ${RIN_APP_CORS_ENABLED:true}
  allow_origins:
    - ${RIN_APP_CORS_ALLOW_ORIGINS:https://admin.example.invalid}
  allow_methods:
    - GET
    - POST
    - PUT
    - DELETE
    - PATCH
    - OPTIONS
  allow_headers:
    - Origin
    - Content-Type
    - X-Request-ID
    - Authorization
  expose_headers:
    - X-Request-ID
  allow_credentials: ${RIN_APP_CORS_ALLOW_CREDENTIALS:false}
  max_age: ${RIN_APP_CORS_MAX_AGE:3600}

auth:
  enabled: ${RIN_APP_AUTH_ENABLED:true}
  self_signup_enabled: ${RIN_APP_AUTH_SELF_SIGNUP_ENABLED:false}
  issuer: ${RIN_APP_AUTH_ISSUER:go-scaffold}
  audience:
    - go-scaffold-api
  signing_key: ${RIN_APP_AUTH_SIGNING_KEY}
  access_token_ttl_seconds: ${RIN_APP_AUTH_ACCESS_TOKEN_TTL_SECONDS:900}
  refresh_token_ttl_seconds: ${RIN_APP_AUTH_REFRESH_TOKEN_TTL_SECONDS:604800}
  refresh_token_pepper: ${RIN_APP_AUTH_REFRESH_TOKEN_PEPPER}
  mfa_issuer: ${RIN_APP_AUTH_MFA_ISSUER:go-scaffold}
  mfa_secret_key: ${RIN_APP_AUTH_MFA_SECRET_KEY}
  login_max_failures: ${RIN_APP_AUTH_LOGIN_MAX_FAILURES:5}
  login_lock_minutes: ${RIN_APP_AUTH_LOGIN_LOCK_MINUTES:15}
  login_captcha_enabled: ${RIN_APP_AUTH_LOGIN_CAPTCHA_ENABLED:false}
  captcha_ttl_seconds: ${RIN_APP_AUTH_CAPTCHA_TTL_SECONDS:120}
  invitation_ttl_seconds: ${RIN_APP_AUTH_INVITATION_TTL_SECONDS:86400}
  password_reset_ttl_seconds: ${RIN_APP_AUTH_PASSWORD_RESET_TTL_SECONDS:1800}
  notification_driver: ${RIN_APP_AUTH_NOTIFICATION_DRIVER:smtp}
  smtp:
    host: ${RIN_APP_AUTH_SMTP_HOST}
    port: ${RIN_APP_AUTH_SMTP_PORT:587}
    username: ${RIN_APP_AUTH_SMTP_USERNAME}
    password: ${RIN_APP_AUTH_SMTP_PASSWORD}
    from: ${RIN_APP_AUTH_SMTP_FROM}
    from_name: ${RIN_APP_AUTH_SMTP_FROM_NAME:Aoi Admin}
    starttls: ${RIN_APP_AUTH_SMTP_STARTTLS:true}
  password_policy:
    min_length: ${RIN_APP_AUTH_PASSWORD_MIN_LENGTH:10}
    require_lower: ${RIN_APP_AUTH_PASSWORD_REQUIRE_LOWER:true}
    require_upper: ${RIN_APP_AUTH_PASSWORD_REQUIRE_UPPER:true}
    require_number: ${RIN_APP_AUTH_PASSWORD_REQUIRE_NUMBER:true}
    require_symbol: ${RIN_APP_AUTH_PASSWORD_REQUIRE_SYMBOL:false}
  casbin_reload_interval_seconds: ${RIN_APP_AUTH_CASBIN_RELOAD_INTERVAL_SECONDS:300}

migration:
  auto_apply: ${RIN_APP_MIGRATION_AUTO_APPLY:false}
  dir: ${RIN_APP_MIGRATION_DIR:./internal/migrations}

env_override:
  disabled_paths: []
