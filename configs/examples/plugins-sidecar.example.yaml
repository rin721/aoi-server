# 场景：启用 demo1 sidecar 插件。
# 主服务读取内联插件清单并代理 /api/v1/plugins/demo1/proxy/api/... 到 sidecar。
# 运行前需要另开进程启动 plugins/demo1，并设置 AOI_DEMO1_PLUGIN_SECRET。

server:
  host: 127.0.0.1
  port: 9999
  mode: debug
  read_timeout: 10
  write_timeout: 10
  idle_timeout: 30

webui:
  enabled: true
  mount_path: /admin
  dist_dir: ./web/admin/.output/public
  public_base_url: /admin

rpc:
  enabled: false
  host: 127.0.0.1
  port: 10099
  read_timeout: 10
  write_timeout: 10
  idle_timeout: 30

plugins:
  enabled: true
  # 本场景使用内联清单；如果改用文件清单，可把 ./plugins/demo1/plugin.yaml 放入 manifests。
  manifests: []
  items:
    - id: demo1
      name: Demo1 Sidecar
      version: 0.1.0
      base_url: http://127.0.0.1:10098
      health_path: /health
      frontend:
        entry: /assets/remote.js
      menus:
        - code: demo1.home
          label: Sidecar Demo
          icon: blocks
          path: /
          permission: plugin:proxy
          order: 900
      permissions:
        - code: demo1:read
          name: Read Demo1
          description: Read data exposed by the demo1 sidecar.
      proxy:
        prefixes:
          - /api
      # secret_ref 是环境变量名，不是 secret 本身。不要把真实密钥写进 YAML。
      secret_ref: AOI_DEMO1_PLUGIN_SECRET
  health_timeout_seconds: 3
  proxy_timeout_seconds: 30

database:
  driver: sqlite
  host: ""
  port: 0
  user: ""
  password: ""
  dbname: ./data/app.db
  max_open_conns: 1
  max_idle_conns: 1

redis:
  enabled: false
  host: 127.0.0.1
  port: 6379
  password: ""
  db: 0
  pool_size: 0
  min_idle_conns: 0
  max_retries: 0
  dial_timeout: 5
  read_timeout: 3
  write_timeout: 3

logger:
  level: info
  format: console
  console_format: console
  file_format: json
  output: stdout
  file_path: ./logs/app.log
  max_size: 100
  max_backups: 7
  max_age: 30

i18n:
  default: zh-CN
  supported:
    - zh-CN
    - en-US
  messages_dir: ./configs/locales

executor:
  enabled: true
  pools:
    - name: background
      size: 8
      expiry: 30
      non_blocking: true

storage:
  enabled: false
  fs_type: basepath
  base_path: ./data
  enable_watch: false
  watch_buffer_size: 100

demo:
  enabled: true
  apply_schema_on_start: true

system:
  seed_defaults_on_start: true

cors:
  enabled: true
  allow_origins:
    - "*"
  allow_methods:
    - GET
    - POST
    - PUT
    - DELETE
    - PATCH
    - OPTIONS
  allow_headers:
    - Origin
    - Content-Type
    - X-Request-ID
    - Authorization
  expose_headers:
    - X-Request-ID
  allow_credentials: false
  max_age: 3600

auth:
  # 插件模块依赖 IAM handler，因此启用插件时必须保持 auth.enabled=true。
  enabled: true
  self_signup_enabled: true
  issuer: go-scaffold
  audience:
    - go-scaffold-api
  signing_key: ${AUTH_SIGNING_KEY:dev-signing-key-change-me-32-bytes}
  access_token_ttl_seconds: 900
  refresh_token_ttl_seconds: 604800
  refresh_token_pepper: ${AUTH_REFRESH_TOKEN_PEPPER:dev-refresh-pepper-change-me-32}
  mfa_issuer: go-scaffold
  mfa_secret_key: ${AUTH_MFA_SECRET_KEY:dev-mfa-secret-key-change-me-32-bytes}
  login_max_failures: 5
  login_lock_minutes: 15
  login_captcha_enabled: false
  captcha_ttl_seconds: 120
  invitation_ttl_seconds: 86400
  password_reset_ttl_seconds: 1800
  notification_driver: debug
  smtp:
    host: ${AUTH_SMTP_HOST:}
    port: ${AUTH_SMTP_PORT:587}
    username: ${AUTH_SMTP_USERNAME:}
    password: ${AUTH_SMTP_PASSWORD:}
    from: ${AUTH_SMTP_FROM:}
    from_name: ${AUTH_SMTP_FROM_NAME:Aoi Admin}
    starttls: true
  password_policy:
    min_length: 8
    require_lower: false
    require_upper: false
    require_number: false
    require_symbol: false
  casbin_reload_interval_seconds: 300

migration:
  auto_apply: true
  dir: ./internal/migrations

env_override:
  disabled_paths: []
