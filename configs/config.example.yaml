server:
  # 服务器状态页会自动采集主机 CPU、内存和磁盘指标，无需额外配置。
  host: 127.0.0.1
  port: 9999
  mode: debug
  read_timeout: 10
  write_timeout: 10
  idle_timeout: 30

webui:
  enabled: true
  mount_path: /admin
  dist_dir: ./web/admin/.output/public
  public_base_url: /admin

rpc:
  enabled: false
  host: 127.0.0.1
  port: 10099
  read_timeout: 10
  write_timeout: 10
  idle_timeout: 30

plugins:
  enabled: false
  manifests:
    - ./plugins/demo1/plugin.yaml
  health_timeout_seconds: 3
  proxy_timeout_seconds: 30

database:
  # 本地默认使用 SQLite。只有在目标数据库可用时才切换到 mysql/postgres。
  driver: sqlite
  dbname: ./data/app.db
  max_open_conns: 1
  max_idle_conns: 1

redis:
  enabled: false
  host: 127.0.0.1
  port: 6379
  db: 0

logger:
  level: info
  format: console
  output: stdout

i18n:
  default: zh-CN
  supported:
    - zh-CN
    - en-US
  messages_dir: ./configs/locales

executor:
  enabled: true
  pools:
    - name: background
      size: 8
      expiry: 30
      non_blocking: true

storage:
  # 媒体库普通上传和本地下载依赖 storage.enabled=true。仅使用外链导入时可以保持禁用。
  # 本地开发建议使用 basepath + ./data，让媒体对象写入 data/media/...。
  enabled: false
  fs_type: basepath
  base_path: ./data
  enable_watch: false
  watch_buffer_size: 100

demo:
  enabled: true
  apply_schema_on_start: true

system:
  # 版本管理使用 system_versions 迁移和 IAM version:* 权限，不需要额外运行期开关。
  # 媒体库使用 system_media_categories/system_media_assets 迁移和 IAM media:* 权限。
  seed_defaults_on_start: true

cors:
  enabled: true
  allow_origins:
    - "*"
  allow_methods:
    - GET
    - POST
    - PUT
    - DELETE
    - PATCH
    - OPTIONS
  allow_headers:
    - Origin
    - Content-Type
    - X-Request-ID
    - Authorization
  expose_headers:
    - X-Request-ID
  allow_credentials: false
  max_age: 3600

auth:
  enabled: true
  self_signup_enabled: true
  issuer: go-scaffold
  audience:
    - go-scaffold-api
  signing_key: ${AUTH_SIGNING_KEY:dev-signing-key-change-me-32-bytes}
  access_token_ttl_seconds: 900
  refresh_token_ttl_seconds: 604800
  # Also hashes IAM API Token values. Rotating this invalidates existing refresh tokens and API tokens.
  refresh_token_pepper: ${AUTH_REFRESH_TOKEN_PEPPER:dev-refresh-pepper-change-me-32}
  mfa_issuer: go-scaffold
  mfa_secret_key: ${AUTH_MFA_SECRET_KEY:dev-mfa-secret-key-change-me-32-bytes}
  login_max_failures: 5
  login_lock_minutes: 15
  login_captcha_enabled: false
  captcha_ttl_seconds: 120
  invitation_ttl_seconds: 86400
  password_reset_ttl_seconds: 1800
  notification_driver: debug
  smtp:
    host: ${AUTH_SMTP_HOST:}
    port: ${AUTH_SMTP_PORT:587}
    username: ${AUTH_SMTP_USERNAME:}
    password: ${AUTH_SMTP_PASSWORD:}
    from: ${AUTH_SMTP_FROM:}
    from_name: ${AUTH_SMTP_FROM_NAME:Aoi Admin}
    starttls: true
  password_policy:
    min_length: 8
    require_lower: false
    require_upper: false
    require_number: false
    require_symbol: false
  casbin_reload_interval_seconds: 300

migration:
  auto_apply: true
  dir: ./internal/migrations
