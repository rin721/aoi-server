services:
  go-scaffold:
    image: ${DEPLOY_IMAGE:?set DEPLOY_IMAGE}
    container_name: ${DEPLOY_CONTAINER_NAME:-go-scaffold}
    restart: unless-stopped
    ports:
      - "${APP_PORT:-9999}:9999"
    environment:
      RIN_CONFIG_PATH: /app/configs/config.yaml
      RIN_APP_DB_DRIVER: ${RIN_APP_DB_DRIVER:-}
      RIN_APP_DB_HOST: ${RIN_APP_DB_HOST:-}
      RIN_APP_DB_PORT: ${RIN_APP_DB_PORT:-}
      RIN_APP_DB_USER: ${RIN_APP_DB_USER:-}
      RIN_APP_DB_PASSWORD: ${RIN_APP_DB_PASSWORD:-}
      RIN_APP_DB_NAME: ${RIN_APP_DB_NAME:-}
      RIN_APP_DB_MAX_OPEN_CONNS: ${RIN_APP_DB_MAX_OPEN_CONNS:-}
      RIN_APP_DB_MAX_IDLE_CONNS: ${RIN_APP_DB_MAX_IDLE_CONNS:-}
      RIN_APP_REDIS_ENABLED: ${RIN_APP_REDIS_ENABLED:-}
      RIN_APP_REDIS_HOST: ${RIN_APP_REDIS_HOST:-}
      RIN_APP_REDIS_PORT: ${RIN_APP_REDIS_PORT:-}
      RIN_APP_REDIS_PASSWORD: ${RIN_APP_REDIS_PASSWORD:-}
      RIN_APP_REDIS_DB: ${RIN_APP_REDIS_DB:-}
      RIN_APP_REDIS_POOL_SIZE: ${RIN_APP_REDIS_POOL_SIZE:-}
      RIN_APP_REDIS_MIN_IDLE_CONNS: ${RIN_APP_REDIS_MIN_IDLE_CONNS:-}
      RIN_APP_REDIS_MAX_RETRIES: ${RIN_APP_REDIS_MAX_RETRIES:-}
      RIN_APP_REDIS_DIAL_TIMEOUT: ${RIN_APP_REDIS_DIAL_TIMEOUT:-}
      RIN_APP_REDIS_READ_TIMEOUT: ${RIN_APP_REDIS_READ_TIMEOUT:-}
      RIN_APP_REDIS_WRITE_TIMEOUT: ${RIN_APP_REDIS_WRITE_TIMEOUT:-}
      RIN_APP_SERVER_MODE: ${RIN_APP_SERVER_MODE:-}
      RIN_APP_SERVER_READ_TIMEOUT: ${RIN_APP_SERVER_READ_TIMEOUT:-}
      RIN_APP_SERVER_WRITE_TIMEOUT: ${RIN_APP_SERVER_WRITE_TIMEOUT:-}
      RIN_APP_WEBUI_ENABLED: ${RIN_APP_WEBUI_ENABLED:-}
      RIN_APP_WEBUI_MOUNT_PATH: ${RIN_APP_WEBUI_MOUNT_PATH:-}
      RIN_APP_WEBUI_DIST_DIR: ${RIN_APP_WEBUI_DIST_DIR:-}
      RIN_APP_WEBUI_PUBLIC_BASE_URL: ${RIN_APP_WEBUI_PUBLIC_BASE_URL:-}
      RIN_APP_PLUGINS_ENABLED: ${RIN_APP_PLUGINS_ENABLED:-}
      RIN_APP_PLUGINS_MANIFESTS: ${RIN_APP_PLUGINS_MANIFESTS:-}
      RIN_APP_PLUGINS_HEALTH_TIMEOUT_SECONDS: ${RIN_APP_PLUGINS_HEALTH_TIMEOUT_SECONDS:-}
      RIN_APP_PLUGINS_PROXY_TIMEOUT_SECONDS: ${RIN_APP_PLUGINS_PROXY_TIMEOUT_SECONDS:-}
      RIN_APP_LOG_LEVEL: ${RIN_APP_LOG_LEVEL:-}
      RIN_APP_LOG_FORMAT: ${RIN_APP_LOG_FORMAT:-}
      RIN_APP_LOG_OUTPUT: ${RIN_APP_LOG_OUTPUT:-}
      RIN_APP_I18N_DEFAULT: ${RIN_APP_I18N_DEFAULT:-}
      RIN_APP_I18N_SUPPORTED: ${RIN_APP_I18N_SUPPORTED:-}
      RIN_APP_STORAGE_ENABLED: ${RIN_APP_STORAGE_ENABLED:-}
      RIN_APP_STORAGE_FS_TYPE: ${RIN_APP_STORAGE_FS_TYPE:-}
      RIN_APP_STORAGE_BASE_PATH: ${RIN_APP_STORAGE_BASE_PATH:-}
      RIN_APP_STORAGE_ENABLE_WATCH: ${RIN_APP_STORAGE_ENABLE_WATCH:-}
      RIN_APP_STORAGE_WATCH_BUFFER_SIZE: ${RIN_APP_STORAGE_WATCH_BUFFER_SIZE:-}
      RIN_APP_DEMO_ENABLED: ${RIN_APP_DEMO_ENABLED:-}
      RIN_APP_DEMO_APPLY_SCHEMA_ON_START: ${RIN_APP_DEMO_APPLY_SCHEMA_ON_START:-}
      RIN_APP_AUTH_ENABLED: ${RIN_APP_AUTH_ENABLED:-}
      RIN_APP_AUTH_ISSUER: ${RIN_APP_AUTH_ISSUER:-}
      RIN_APP_AUTH_AUDIENCE: ${RIN_APP_AUTH_AUDIENCE:-}
      RIN_APP_AUTH_SIGNING_KEY: ${RIN_APP_AUTH_SIGNING_KEY:-}
      RIN_APP_AUTH_ACCESS_TOKEN_TTL_SECONDS: ${RIN_APP_AUTH_ACCESS_TOKEN_TTL_SECONDS:-}
      RIN_APP_AUTH_REFRESH_TOKEN_TTL_SECONDS: ${RIN_APP_AUTH_REFRESH_TOKEN_TTL_SECONDS:-}
      RIN_APP_AUTH_REFRESH_TOKEN_PEPPER: ${RIN_APP_AUTH_REFRESH_TOKEN_PEPPER:-}
      RIN_APP_AUTH_MFA_ISSUER: ${RIN_APP_AUTH_MFA_ISSUER:-}
      RIN_APP_AUTH_MFA_SECRET_KEY: ${RIN_APP_AUTH_MFA_SECRET_KEY:-}
      RIN_APP_AUTH_LOGIN_MAX_FAILURES: ${RIN_APP_AUTH_LOGIN_MAX_FAILURES:-}
      RIN_APP_AUTH_LOGIN_LOCK_MINUTES: ${RIN_APP_AUTH_LOGIN_LOCK_MINUTES:-}
      RIN_APP_AUTH_INVITATION_TTL_SECONDS: ${RIN_APP_AUTH_INVITATION_TTL_SECONDS:-}
      RIN_APP_AUTH_PASSWORD_RESET_TTL_SECONDS: ${RIN_APP_AUTH_PASSWORD_RESET_TTL_SECONDS:-}
      RIN_APP_AUTH_NOTIFICATION_DRIVER: ${RIN_APP_AUTH_NOTIFICATION_DRIVER:-}
      RIN_APP_AUTH_SMTP_HOST: ${RIN_APP_AUTH_SMTP_HOST:-}
      RIN_APP_AUTH_SMTP_PORT: ${RIN_APP_AUTH_SMTP_PORT:-}
      RIN_APP_AUTH_SMTP_USERNAME: ${RIN_APP_AUTH_SMTP_USERNAME:-}
      RIN_APP_AUTH_SMTP_PASSWORD: ${RIN_APP_AUTH_SMTP_PASSWORD:-}
      RIN_APP_AUTH_SMTP_FROM: ${RIN_APP_AUTH_SMTP_FROM:-}
      RIN_APP_AUTH_SMTP_FROM_NAME: ${RIN_APP_AUTH_SMTP_FROM_NAME:-}
      RIN_APP_AUTH_SMTP_STARTTLS: ${RIN_APP_AUTH_SMTP_STARTTLS:-}
      RIN_APP_AUTH_CASBIN_RELOAD_INTERVAL_SECONDS: ${RIN_APP_AUTH_CASBIN_RELOAD_INTERVAL_SECONDS:-}
      RIN_APP_MIGRATION_AUTO_APPLY: ${RIN_APP_MIGRATION_AUTO_APPLY:-}
      RIN_APP_MIGRATION_DIR: ${RIN_APP_MIGRATION_DIR:-}
      AUTH_SIGNING_KEY: ${AUTH_SIGNING_KEY:-}
      AUTH_REFRESH_TOKEN_PEPPER: ${AUTH_REFRESH_TOKEN_PEPPER:-}
      AUTH_MFA_SECRET_KEY: ${AUTH_MFA_SECRET_KEY:-}
      AUTH_SMTP_HOST: ${AUTH_SMTP_HOST:-}
      AUTH_SMTP_PORT: ${AUTH_SMTP_PORT:-}
      AUTH_SMTP_USERNAME: ${AUTH_SMTP_USERNAME:-}
      AUTH_SMTP_PASSWORD: ${AUTH_SMTP_PASSWORD:-}
      AUTH_SMTP_FROM: ${AUTH_SMTP_FROM:-}
      AUTH_SMTP_FROM_NAME: ${AUTH_SMTP_FROM_NAME:-}
      AOI_DEMO1_PLUGIN_SECRET: ${AOI_DEMO1_PLUGIN_SECRET:-}
      RIN_APP_CORS_ENABLED: ${RIN_APP_CORS_ENABLED:-}
      RIN_APP_CORS_ALLOW_ORIGINS: ${RIN_APP_CORS_ALLOW_ORIGINS:-}
      RIN_APP_CORS_ALLOW_METHODS: ${RIN_APP_CORS_ALLOW_METHODS:-}
      RIN_APP_CORS_ALLOW_HEADERS: ${RIN_APP_CORS_ALLOW_HEADERS:-}
      RIN_APP_CORS_EXPOSE_HEADERS: ${RIN_APP_CORS_EXPOSE_HEADERS:-}
      RIN_APP_CORS_ALLOW_CREDENTIALS: ${RIN_APP_CORS_ALLOW_CREDENTIALS:-}
      RIN_APP_CORS_MAX_AGE: ${RIN_APP_CORS_MAX_AGE:-}
    volumes:
      - ./configs/config.yaml:/app/configs/config.yaml:ro
      - ./data:/app/data
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9999/health >/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    security_opt:
      - no-new-privileges:true
    read_only: false
