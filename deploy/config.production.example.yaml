server:
  host: 0.0.0.0
  port: 9999
  mode: release
  read_timeout: 10
  write_timeout: 10
  idle_timeout: 30

database:
  # 真实生产数据建议切换到 mysql 或 postgres。
  # 凭证不要写入 Git，应通过运行时环境注入。
  driver: sqlite
  dbname: ./data/app.db
  max_open_conns: 5
  max_idle_conns: 2

redis:
  enabled: false
  host: 127.0.0.1
  port: 6379
  db: 0

logger:
  level: info
  format: console
  output: stdout

i18n:
  default: zh-CN
  supported:
    - zh-CN
    - en-US
  messages_dir: ./configs/locales

executor:
  enabled: true
  pools:
    - name: background
      size: 8
      expiry: 30
      non_blocking: true

storage:
  enabled: false
  fs_type: basepath
  base_path: ./data
  enable_watch: false
  watch_buffer_size: 100

webui:
  enabled: true
  mount_path: /admin
  dist_dir: ./web/admin/.output/public
  public_base_url: ${WEBUI_PUBLIC_BASE_URL}

plugins:
  enabled: ${PLUGINS_ENABLED:false}
  manifests:
    - ${PLUGINS_MANIFEST_PATH:./plugins/demo1/plugin.yaml}
  health_timeout_seconds: 3
  proxy_timeout_seconds: 30

demo:
  enabled: false
  apply_schema_on_start: false

auth:
  enabled: true
  self_signup_enabled: false
  issuer: go-scaffold
  audience:
    - go-scaffold-api
  signing_key: ${AUTH_SIGNING_KEY}
  access_token_ttl_seconds: 900
  refresh_token_ttl_seconds: 604800
  refresh_token_pepper: ${AUTH_REFRESH_TOKEN_PEPPER}
  mfa_issuer: go-scaffold
  mfa_secret_key: ${AUTH_MFA_SECRET_KEY}
  login_max_failures: 5
  login_lock_minutes: 15
  invitation_ttl_seconds: 86400
  password_reset_ttl_seconds: 1800
  notification_driver: smtp
  smtp:
    host: ${AUTH_SMTP_HOST}
    port: ${AUTH_SMTP_PORT:587}
    username: ${AUTH_SMTP_USERNAME}
    password: ${AUTH_SMTP_PASSWORD}
    from: ${AUTH_SMTP_FROM}
    from_name: ${AUTH_SMTP_FROM_NAME:Aoi Admin}
    starttls: true
  password_policy:
    min_length: 10
    require_lower: true
    require_upper: true
    require_number: true
    require_symbol: false
  casbin_reload_interval_seconds: 300

migration:
  auto_apply: false
  dir: ./internal/migrations

cors:
  enabled: true
  allow_origins:
    - "*"
  allow_methods:
    - GET
    - POST
    - PUT
    - DELETE
    - PATCH
    - OPTIONS
  allow_headers:
    - Origin
    - Content-Type
    - X-Request-ID
    - Authorization
  expose_headers:
    - X-Request-ID
  allow_credentials: false
  max_age: 3600
